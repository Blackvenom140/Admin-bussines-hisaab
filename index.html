<!DOCTYPE html>
<html lang="en">
  <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Retail Manager Pro</title>
<style>
    :root {
      --primary: #2563eb;
      --cash: #1b5e20;
      --upi: #0d47a1;
      --danger: #dc2626;
      --warning: #f59e0b;
      --success: #10b981;
      --light-bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text-dark: #1e293b;
      --text-light: #64748b;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --radius: 12px;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--light-bg);
      color: var(--text-dark);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .date-display {
      font-size: 0.9rem;
      color: var(--text-light);
      background: var(--card-bg);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      background: #e2e8f0;
      color: var(--text-light);
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--text-light);
    }

    input, select {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      transition: var(--transition);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    button.primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    button.primary:hover {      background: #1d4ed8;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }

    .summary-item {
      text-align: center;
      padding: 16px;
      background: var(--light-bg);
      border-radius: var(--radius);
    }

    .summary-item label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .value.large {
      font-size: 2rem;
      color: var(--primary);
    }

    .cash-total {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }

    .upi-total {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .grand-total {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
    }

    .sale-list, .udhar-list {      max-height: 60vh;
      overflow-y: auto;
    }

    .transaction-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .transaction-item:last-child {
      border-bottom: none;
    }

    .transaction-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .transaction-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .payment-tag {
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .tag-cash {
      background: #e8f5e9;
      color: var(--cash);
    }

    .tag-upi {
      background: #e3f2fd;
      color: var(--upi);
    }

    .transaction-amount {
      font-weight: 700;
      font-size: 1.1rem;
      margin: 4px 0;
    }

    .transaction-meta {      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-small {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-edit {
      background: #dbeafe;
      color: var(--primary);
    }

    .btn-edit:hover {
      background: #bfdbfe;
    }

    .btn-delete {
      background: #fee2e2;
      color: var(--danger);
    }

    .btn-delete:hover {
      background: #fecaca;
    }

    .footer-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: white;
      box-shadow: 0 -3px 15px rgba(0, 0, 0, 0.08);
      z-index: 100;
    }

    .footer-nav button {      flex: 1;
      background: none;
      color: var(--text-light);
      border: none;
      padding: 15px 0;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .footer-nav button.active {
      color: var(--primary);
      border-top: 3px solid var(--primary);
    }

    @media (max-width: 768px) {
      .container {
        padding: 10px;
      }

      .header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
</style>
  </head>
  <body>
	<div class="container">
	  <!-- Header -->
	  <header class="header">
		<h1>💼 Retail Manager Pro</h1>
		<div class="date-display" id="currentDate"></div>
	  </header>

	  <!-- Navigation Tabs -->
	  <div class="tabs">
		<button id="tabSale" class="tab-btn active" onclick="switchTab('sale')">
		  Manage Sales
		</button>
		<button id="tabAnalytics" class="tab-btn" onclick="switchTab('analytics')">        Analytics
		</button>
	  </div>

	  <!-- Sale Page -->
	  <div id="salePage" class="page active">
		<!-- Sale Entry Form -->
		<div class="card">
		  <div class="form-grid">
			<div class="form-group">
			  <label for="itemName">Item Name</label>
			  <input type="text" id="itemName" placeholder="Enter item name">
			</div>
			<div class="form-group">
			  <label for="itemPrice">Price</label>
			  <input type="number" id="itemPrice" placeholder="Enter price">
			</div>
			<div class="form-group">
			  <label for="itemQty">Quantity</label>
			  <select id="itemQty" onchange="checkCustomQty()">
				<option value="1">1</option>
				<option value="2">2</option>
				<option value="3">3</option>
				<option value="4">4</option>
				<option value="5">5</option>
				<option value="6">6</option>
				<option value="custom">Custom</option>
			  </select>
			</div>
			<div class="form-group" id="customQtyGroup" style="display:none;">
			  <label for="customQty">Custom Quantity</label>
			  <input type="number" id="customQty" placeholder="Enter custom quantity">
			</div>
			<div class="form-group">
			  <label for="paymentMethod">Payment Method</label>
			  <select id="paymentMethod">
				<option value="Cash">Cash</option>
				<option value="UPI">UPI</option>
			  </select>
			</div>
		  </div>
		  <button class="primary" onclick="saveSale()">Save Sale</button>
		</div>

		<!-- Sale Summary -->
		<div class="summary-grid">
		  <div class="summary-item cash-total">
			<label>💵 Cash Total</label>
			<div class="value" id="cashTotal">₹0</div>
		  </div>        <div class="summary-item upi-total">
			<label>📱 UPI Total</label>
			<div class="value" id="upiTotal">₹0</div>
		  </div>
		  <div class="summary-item grand-total">
			<label>🧾 Grand Total</label>
			<div class="value large" id="grandTotal">₹0</div>
		  </div>
		</div>

		<!-- Sale List -->
		<div class="card sale-list" id="saleList">
		  <!-- Sale items will be loaded here -->
		</div>
	  </div>

	  <!-- Udhar Page -->
	  <div id="udharPage" class="page hidden">
		<!-- Udhar Entry Form -->
		<div class="card">
		  <div class="form-grid">
			<div class="form-group">
			  <label for="udharName">Customer Name</label>
			  <input type="text" id="udharName" placeholder="Enter customer name">
			</div>
			<div class="form-group">
			  <label for="udharAmount">Amount</label>
			  <input type="number" id="udharAmount" placeholder="Enter amount">
			</div>
			<div class="form-group">
			  <label for="udharPayment">Payment Method</label>
			  <select id="udharPayment">
				<option value="Cash">Cash</option>
				<option value="UPI">UPI</option>
			  </select>
			</div>
		  </div>
		  <button class="primary" onclick="saveUdhar()">Save Udhaar</button>
		</div>

		<!-- Udhar Summary -->
		<div class="summary-grid">
		  <div class="summary-item grand-total">
			<label>💳 Total Udhaar</label>
			<div class="value large" id="udharTotal">₹0</div>
		  </div>
		</div>

		<!-- Udhar List -->
		<div class="card udhar-list" id="udharList">        <!-- Udhar items will be loaded here -->
		</div>
	  </div>

	  <!-- Analytics Page -->
	  <div id="analyticsPage" class="page hidden">
		<div class="analytics-grid">
		  <div class="card stat-card">
			<h3>📊 Financial Overview</h3>
			<p>Total Cash: <span id="aCash">₹0</span></p>
			<p>Total UPI: <span id="aUpi">₹0</span></p>
			<p class="highlight">Grand Total: <span id="aGrand">₹0</span></p>
		  </div>

		  <div class="card stat-card">
			<h3>📈 Top Performer</h3>
			<div id="mostProduct">Loading...</div>
		  </div>

		  <div class="card stat-card">
			<h3>📅 Best Day</h3>
			<div id="bestDay">Loading...</div>
		  </div>

		  <div class="card stat-card wide">
			<h3>🗓️ Daily Breakdown</h3>
			<div id="dailyBreakdown" class="breakdown-list">
			  <!-- Dynamic data here -->
			</div>
		  </div>
		</div>
	  </div>
	</div>

	<!-- Footer Navigation (For mobile) -->
	<div class="footer-nav">
	  <button id="saleNavBtn" class="active" onclick="showSale()">Sale</button>
	  <button id="udharNavBtn" onclick="showUdhar()">Udhaar</button>
	</div>

	<script type="module" src="script.js"></script>
  </body>
</html>
